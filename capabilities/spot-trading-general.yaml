naftiko: 1.0.0-alpha2
info:
  label: Binance Spot Trading API
  description: 'Binance Spot Trading API. 3 operations. Lead operation: Exchange information. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: spot-trading-general
    baseUri: https://api.binance.com
    description: Binance Spot Trading API business capability. Self-contained, no shared references.
    resources:
    - name: api-v3-exchangeInfo
      path: /api/v3/exchangeInfo
      operations:
      - name: getexchangeinfo
        method: GET
        description: Exchange information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbols
          in: query
          type: string
          description: JSON array of trading pair symbols to query. Cannot be used with the symbol parameter.
        - name: permissions
          in: query
          type: string
          description: Filter by account permissions such as SPOT or MARGIN.
    - name: api-v3-ping
      path: /api/v3/ping
      operations:
      - name: testconnectivity
        method: GET
        description: Test connectivity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v3-time
      path: /api/v3/time
      operations:
      - name: getservertime
        method: GET
        description: Check server time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: spot-trading-general-rest
    port: 8080
    description: REST adapter for Binance Spot Trading API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v3/exchangeinfo
      name: api-v3-exchangeinfo
      description: REST surface for api-v3-exchangeInfo.
      operations:
      - method: GET
        name: getexchangeinfo
        description: Exchange information
        call: spot-trading-general.getexchangeinfo
        with:
          symbols: rest.symbols
          permissions: rest.permissions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v3/ping
      name: api-v3-ping
      description: REST surface for api-v3-ping.
      operations:
      - method: GET
        name: testconnectivity
        description: Test connectivity
        call: spot-trading-general.testconnectivity
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v3/time
      name: api-v3-time
      description: REST surface for api-v3-time.
      operations:
      - method: GET
        name: getservertime
        description: Check server time
        call: spot-trading-general.getservertime
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spot-trading-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Spot Trading API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: exchange-information
      description: Exchange information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-trading-general.getexchangeinfo
      with:
        symbols: tools.symbols
        permissions: tools.permissions
      outputParameters:
      - type: object
        mapping: $.
    - name: test-connectivity
      description: Test connectivity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-trading-general.testconnectivity
      outputParameters:
      - type: object
        mapping: $.
    - name: check-server-time
      description: Check server time
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-trading-general.getservertime
      outputParameters:
      - type: object
        mapping: $.
