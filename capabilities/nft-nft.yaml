naftiko: 1.0.0-alpha2
info:
  label: Binance NFT API — NFT
  description: 'Binance NFT API — NFT. 4 operations. Lead operation: Get NFT deposit history. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  - NFT
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: nft-nft
    baseUri: https://api.binance.com
    description: Binance NFT API — NFT business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-nft-history-deposit
      path: /sapi/v1/nft/history/deposit
      operations:
      - name: getdeposithistory
        method: GET
        description: Get NFT deposit history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-nft-history-transactions
      path: /sapi/v1/nft/history/transactions
      operations:
      - name: gettransactionhistory
        method: GET
        description: Get NFT transaction history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderType
          in: query
          type: integer
          description: 0=purchase, 1=sell, 2=royalty income, 3=primary market, 4=mint fee.
          required: true
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-nft-history-withdraw
      path: /sapi/v1/nft/history/withdraw
      operations:
      - name: getwithdrawhistory
        method: GET
        description: Get NFT withdraw history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-nft-user-getAsset
      path: /sapi/v1/nft/user/getAsset
      operations:
      - name: getnftassets
        method: GET
        description: Get NFT asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nft-nft-rest
    port: 8080
    description: REST adapter for Binance NFT API — NFT. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sapi/v1/nft/history/deposit
      name: sapi-v1-nft-history-deposit
      description: REST surface for sapi-v1-nft-history-deposit.
      operations:
      - method: GET
        name: getdeposithistory
        description: Get NFT deposit history
        call: nft-nft.getdeposithistory
        with:
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
          page: rest.page
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/nft/history/transactions
      name: sapi-v1-nft-history-transactions
      description: REST surface for sapi-v1-nft-history-transactions.
      operations:
      - method: GET
        name: gettransactionhistory
        description: Get NFT transaction history
        call: nft-nft.gettransactionhistory
        with:
          orderType: rest.orderType
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
          page: rest.page
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/nft/history/withdraw
      name: sapi-v1-nft-history-withdraw
      description: REST surface for sapi-v1-nft-history-withdraw.
      operations:
      - method: GET
        name: getwithdrawhistory
        description: Get NFT withdraw history
        call: nft-nft.getwithdrawhistory
        with:
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
          page: rest.page
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/nft/user/getasset
      name: sapi-v1-nft-user-getasset
      description: REST surface for sapi-v1-nft-user-getAsset.
      operations:
      - method: GET
        name: getnftassets
        description: Get NFT asset
        call: nft-nft.getnftassets
        with:
          limit: rest.limit
          page: rest.page
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nft-nft-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance NFT API — NFT. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-nft-deposit-history
      description: Get NFT deposit history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nft-nft.getdeposithistory
      with:
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
        page: tools.page
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nft-transaction-history
      description: Get NFT transaction history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nft-nft.gettransactionhistory
      with:
        orderType: tools.orderType
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
        page: tools.page
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nft-withdraw-history
      description: Get NFT withdraw history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nft-nft.getwithdrawhistory
      with:
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
        page: tools.page
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nft-asset
      description: Get NFT asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nft-nft.getnftassets
      with:
        limit: tools.limit
        page: tools.page
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
