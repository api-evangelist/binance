naftiko: 1.0.0-alpha2
info:
  label: Binance Convert API — Convert
  description: 'Binance Convert API — Convert. 5 operations. Lead operation: Accept quote. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  - Convert
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: convert-convert
    baseUri: https://api.binance.com
    description: Binance Convert API — Convert business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-convert-acceptQuote
      path: /sapi/v1/convert/acceptQuote
      operations:
      - name: acceptquote
        method: POST
        description: Accept quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: quoteId
          in: query
          type: string
          description: Quote ID from the quote request.
          required: true
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-convert-exchangeInfo
      path: /sapi/v1/convert/exchangeInfo
      operations:
      - name: getexchangeinfo
        method: GET
        description: List all convert pairs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromAsset
          in: query
          type: string
        - name: toAsset
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-convert-getQuote
      path: /sapi/v1/convert/getQuote
      operations:
      - name: sendquoterequest
        method: POST
        description: Send quote request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromAsset
          in: query
          type: string
          required: true
        - name: toAsset
          in: query
          type: string
          required: true
        - name: fromAmount
          in: query
          type: string
          description: Amount to convert from. Either fromAmount or toAmount required.
        - name: toAmount
          in: query
          type: string
          description: Amount to convert to. Either fromAmount or toAmount required.
        - name: walletType
          in: query
          type: string
          description: SPOT or FUNDING.
        - name: validTime
          in: query
          type: string
          description: Quote validity period in seconds. 10s, 30s, or 120s.
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-convert-orderStatus
      path: /sapi/v1/convert/orderStatus
      operations:
      - name: getorderstatus
        method: GET
        description: Order status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: query
          type: string
          required: true
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-convert-tradeFlow
      path: /sapi/v1/convert/tradeFlow
      operations:
      - name: gettradeflow
        method: GET
        description: Get convert trade history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: integer
          required: true
        - name: endTime
          in: query
          type: integer
          required: true
        - name: limit
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: convert-convert-rest
    port: 8080
    description: REST adapter for Binance Convert API — Convert. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sapi/v1/convert/acceptquote
      name: sapi-v1-convert-acceptquote
      description: REST surface for sapi-v1-convert-acceptQuote.
      operations:
      - method: POST
        name: acceptquote
        description: Accept quote
        call: convert-convert.acceptquote
        with:
          quoteId: rest.quoteId
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/convert/exchangeinfo
      name: sapi-v1-convert-exchangeinfo
      description: REST surface for sapi-v1-convert-exchangeInfo.
      operations:
      - method: GET
        name: getexchangeinfo
        description: List all convert pairs
        call: convert-convert.getexchangeinfo
        with:
          fromAsset: rest.fromAsset
          toAsset: rest.toAsset
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/convert/getquote
      name: sapi-v1-convert-getquote
      description: REST surface for sapi-v1-convert-getQuote.
      operations:
      - method: POST
        name: sendquoterequest
        description: Send quote request
        call: convert-convert.sendquoterequest
        with:
          fromAsset: rest.fromAsset
          toAsset: rest.toAsset
          fromAmount: rest.fromAmount
          toAmount: rest.toAmount
          walletType: rest.walletType
          validTime: rest.validTime
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/convert/orderstatus
      name: sapi-v1-convert-orderstatus
      description: REST surface for sapi-v1-convert-orderStatus.
      operations:
      - method: GET
        name: getorderstatus
        description: Order status
        call: convert-convert.getorderstatus
        with:
          orderId: rest.orderId
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/convert/tradeflow
      name: sapi-v1-convert-tradeflow
      description: REST surface for sapi-v1-convert-tradeFlow.
      operations:
      - method: GET
        name: gettradeflow
        description: Get convert trade history
        call: convert-convert.gettradeflow
        with:
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: convert-convert-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Convert API — Convert. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: accept-quote
      description: Accept quote
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: convert-convert.acceptquote
      with:
        quoteId: tools.quoteId
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-convert-pairs
      description: List all convert pairs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: convert-convert.getexchangeinfo
      with:
        fromAsset: tools.fromAsset
        toAsset: tools.toAsset
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: send-quote-request
      description: Send quote request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: convert-convert.sendquoterequest
      with:
        fromAsset: tools.fromAsset
        toAsset: tools.toAsset
        fromAmount: tools.fromAmount
        toAmount: tools.toAmount
        walletType: tools.walletType
        validTime: tools.validTime
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: order-status
      description: Order status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: convert-convert.getorderstatus
      with:
        orderId: tools.orderId
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: get-convert-trade-history
      description: Get convert trade history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: convert-convert.gettradeflow
      with:
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
