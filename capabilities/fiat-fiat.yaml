naftiko: 1.0.0-alpha2
info:
  label: Binance Fiat API — Fiat
  description: 'Binance Fiat API — Fiat. 2 operations. Lead operation: Get fiat deposit/withdraw history. Self-contained Naftiko
    capability covering one Binance business surface.'
  tags:
  - Binance
  - Fiat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: fiat-fiat
    baseUri: https://api.binance.com
    description: Binance Fiat API — Fiat business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-fiat-orders
      path: /sapi/v1/fiat/orders
      operations:
      - name: getfiatdepositwithdrawhistory
        method: GET
        description: Get fiat deposit/withdraw history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transactionType
          in: query
          type: integer
          description: 0 for deposit, 1 for withdraw.
          required: true
        - name: beginTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: rows
          in: query
          type: integer
          description: Number of rows. Default 100, max 500.
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-fiat-payments
      path: /sapi/v1/fiat/payments
      operations:
      - name: getfiatpaymentshistory
        method: GET
        description: Get fiat payments history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transactionType
          in: query
          type: integer
          description: 0 for buy, 1 for sell.
          required: true
        - name: beginTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: rows
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: fiat-fiat-rest
    port: 8080
    description: REST adapter for Binance Fiat API — Fiat. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sapi/v1/fiat/orders
      name: sapi-v1-fiat-orders
      description: REST surface for sapi-v1-fiat-orders.
      operations:
      - method: GET
        name: getfiatdepositwithdrawhistory
        description: Get fiat deposit/withdraw history
        call: fiat-fiat.getfiatdepositwithdrawhistory
        with:
          transactionType: rest.transactionType
          beginTime: rest.beginTime
          endTime: rest.endTime
          page: rest.page
          rows: rest.rows
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/fiat/payments
      name: sapi-v1-fiat-payments
      description: REST surface for sapi-v1-fiat-payments.
      operations:
      - method: GET
        name: getfiatpaymentshistory
        description: Get fiat payments history
        call: fiat-fiat.getfiatpaymentshistory
        with:
          transactionType: rest.transactionType
          beginTime: rest.beginTime
          endTime: rest.endTime
          page: rest.page
          rows: rest.rows
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fiat-fiat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Fiat API — Fiat. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-fiat-deposit-withdraw-history
      description: Get fiat deposit/withdraw history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiat-fiat.getfiatdepositwithdrawhistory
      with:
        transactionType: tools.transactionType
        beginTime: tools.beginTime
        endTime: tools.endTime
        page: tools.page
        rows: tools.rows
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fiat-payments-history
      description: Get fiat payments history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiat-fiat.getfiatpaymentshistory
      with:
        transactionType: tools.transactionType
        beginTime: tools.beginTime
        endTime: tools.endTime
        page: tools.page
        rows: tools.rows
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
