naftiko: 1.0.0-alpha2
info:
  label: Binance European Options API — Account
  description: 'Binance European Options API — Account. 2 operations. Lead operation: Account information. Self-contained
    Naftiko capability covering one Binance business surface.'
  tags:
  - Binance
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: european-options-account
    baseUri: https://eapi.binance.com
    description: Binance European Options API — Account business capability. Self-contained, no shared references.
    resources:
    - name: eapi-v1-account
      path: /eapi/v1/account
      operations:
      - name: getaccountinfo
        method: GET
        description: Account information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: eapi-v1-position
      path: /eapi/v1/position
      operations:
      - name: getposition
        method: GET
        description: Option position information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: european-options-account-rest
    port: 8080
    description: REST adapter for Binance European Options API — Account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/eapi/v1/account
      name: eapi-v1-account
      description: REST surface for eapi-v1-account.
      operations:
      - method: GET
        name: getaccountinfo
        description: Account information
        call: european-options-account.getaccountinfo
        with:
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/position
      name: eapi-v1-position
      description: REST surface for eapi-v1-position.
      operations:
      - method: GET
        name: getposition
        description: Option position information
        call: european-options-account.getposition
        with:
          symbol: rest.symbol
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: european-options-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance European Options API — Account. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: account-information
      description: Account information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-account.getaccountinfo
      with:
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: option-position-information
      description: Option position information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-account.getposition
      with:
        symbol: tools.symbol
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
