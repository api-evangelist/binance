naftiko: 1.0.0-alpha2
info:
  label: Binance Wallet API — Withdrawals
  description: 'Binance Wallet API — Withdrawals. 2 operations. Lead operation: Withdraw. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  - Withdrawals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallet-withdrawals
    baseUri: https://api.binance.com
    description: Binance Wallet API — Withdrawals business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-capital-withdraw-apply
      path: /sapi/v1/capital/withdraw/apply
      operations:
      - name: withdraw
        method: POST
        description: Withdraw
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: coin
          in: query
          type: string
          required: true
        - name: withdrawOrderId
          in: query
          type: string
          description: Client ID for withdraw.
        - name: network
          in: query
          type: string
        - name: address
          in: query
          type: string
          required: true
        - name: addressTag
          in: query
          type: string
        - name: amount
          in: query
          type: string
          required: true
        - name: transactionFeeFlag
          in: query
          type: boolean
          description: When true, the fee will be deducted from the amount.
        - name: name
          in: query
          type: string
          description: Address label.
        - name: walletType
          in: query
          type: integer
          description: 0 for spot wallet, 1 for funding wallet.
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-capital-withdraw-history
      path: /sapi/v1/capital/withdraw/history
      operations:
      - name: getwithdrawhistory
        method: GET
        description: Withdraw history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: coin
          in: query
          type: string
        - name: withdrawOrderId
          in: query
          type: string
        - name: status
          in: query
          type: integer
          description: 0=email sent, 1=cancelled, 2=awaiting approval, 3=rejected, 4=processing, 5=failure, 6=completed.
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallet-withdrawals-rest
    port: 8080
    description: REST adapter for Binance Wallet API — Withdrawals. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sapi/v1/capital/withdraw/apply
      name: sapi-v1-capital-withdraw-apply
      description: REST surface for sapi-v1-capital-withdraw-apply.
      operations:
      - method: POST
        name: withdraw
        description: Withdraw
        call: wallet-withdrawals.withdraw
        with:
          coin: rest.coin
          withdrawOrderId: rest.withdrawOrderId
          network: rest.network
          address: rest.address
          addressTag: rest.addressTag
          amount: rest.amount
          transactionFeeFlag: rest.transactionFeeFlag
          name: rest.name
          walletType: rest.walletType
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/capital/withdraw/history
      name: sapi-v1-capital-withdraw-history
      description: REST surface for sapi-v1-capital-withdraw-history.
      operations:
      - method: GET
        name: getwithdrawhistory
        description: Withdraw history
        call: wallet-withdrawals.getwithdrawhistory
        with:
          coin: rest.coin
          withdrawOrderId: rest.withdrawOrderId
          status: rest.status
          startTime: rest.startTime
          endTime: rest.endTime
          offset: rest.offset
          limit: rest.limit
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallet-withdrawals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Wallet API — Withdrawals. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: withdraw
      description: Withdraw
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wallet-withdrawals.withdraw
      with:
        coin: tools.coin
        withdrawOrderId: tools.withdrawOrderId
        network: tools.network
        address: tools.address
        addressTag: tools.addressTag
        amount: tools.amount
        transactionFeeFlag: tools.transactionFeeFlag
        name: tools.name
        walletType: tools.walletType
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: withdraw-history
      description: Withdraw history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-withdrawals.getwithdrawhistory
      with:
        coin: tools.coin
        withdrawOrderId: tools.withdrawOrderId
        status: tools.status
        startTime: tools.startTime
        endTime: tools.endTime
        offset: tools.offset
        limit: tools.limit
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
