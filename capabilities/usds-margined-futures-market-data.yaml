naftiko: 1.0.0-alpha2
info:
  label: Binance USD-S Margined Futures API — Market Data
  description: 'Binance USD-S Margined Futures API — Market Data. 12 operations. Lead operation: Order book. Self-contained
    Naftiko capability covering one Binance business surface.'
  tags:
  - Binance
  - Market Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: usds-margined-futures-market-data
    baseUri: https://fapi.binance.com
    description: Binance USD-S Margined Futures API — Market Data business capability. Self-contained, no shared references.
    resources:
    - name: fapi-v1-depth
      path: /fapi/v1/depth
      operations:
      - name: getorderbook
        method: GET
        description: Order book
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of levels. Default 500. Valid values are 5, 10, 20, 50, 100, 500, 1000.
    - name: fapi-v1-exchangeInfo
      path: /fapi/v1/exchangeInfo
      operations:
      - name: getexchangeinfo
        method: GET
        description: Exchange information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-fundingInfo
      path: /fapi/v1/fundingInfo
      operations:
      - name: getfundinginfo
        method: GET
        description: Get funding rate info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-fundingRate
      path: /fapi/v1/fundingRate
      operations:
      - name: getfundingratehistory
        method: GET
        description: Get funding rate history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: integer
          description: Start time in milliseconds.
        - name: endTime
          in: query
          type: integer
          description: End time in milliseconds.
        - name: limit
          in: query
          type: integer
          description: Number of results. Default 100, max 1000.
    - name: fapi-v1-klines
      path: /fapi/v1/klines
      operations:
      - name: getklines
        method: GET
        description: Kline/Candlestick data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: interval
          in: query
          type: string
          description: Kline interval.
          required: true
        - name: startTime
          in: query
          type: integer
          description: Start time in milliseconds.
        - name: endTime
          in: query
          type: integer
          description: End time in milliseconds.
        - name: limit
          in: query
          type: integer
          description: Number of results. Default 500, max 1500.
    - name: fapi-v1-openInterest
      path: /fapi/v1/openInterest
      operations:
      - name: getopeninterest
        method: GET
        description: Open interest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-ping
      path: /fapi/v1/ping
      operations:
      - name: testconnectivity
        method: GET
        description: Test connectivity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-premiumIndex
      path: /fapi/v1/premiumIndex
      operations:
      - name: getmarkprice
        method: GET
        description: Mark price
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-ticker-24hr
      path: /fapi/v1/ticker/24hr
      operations:
      - name: get24hrticker
        method: GET
        description: 24hr ticker price change statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-ticker-price
      path: /fapi/v1/ticker/price
      operations:
      - name: gettickerprice
        method: GET
        description: Symbol price ticker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-time
      path: /fapi/v1/time
      operations:
      - name: getservertime
        method: GET
        description: Check server time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fapi-v1-trades
      path: /fapi/v1/trades
      operations:
      - name: getrecenttrades
        method: GET
        description: Recent trades list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of trades. Default 500, max 1000.
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: usds-margined-futures-market-data-rest
    port: 8080
    description: REST adapter for Binance USD-S Margined Futures API — Market Data. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/fapi/v1/depth
      name: fapi-v1-depth
      description: REST surface for fapi-v1-depth.
      operations:
      - method: GET
        name: getorderbook
        description: Order book
        call: usds-margined-futures-market-data.getorderbook
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/exchangeinfo
      name: fapi-v1-exchangeinfo
      description: REST surface for fapi-v1-exchangeInfo.
      operations:
      - method: GET
        name: getexchangeinfo
        description: Exchange information
        call: usds-margined-futures-market-data.getexchangeinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/fundinginfo
      name: fapi-v1-fundinginfo
      description: REST surface for fapi-v1-fundingInfo.
      operations:
      - method: GET
        name: getfundinginfo
        description: Get funding rate info
        call: usds-margined-futures-market-data.getfundinginfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/fundingrate
      name: fapi-v1-fundingrate
      description: REST surface for fapi-v1-fundingRate.
      operations:
      - method: GET
        name: getfundingratehistory
        description: Get funding rate history
        call: usds-margined-futures-market-data.getfundingratehistory
        with:
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/klines
      name: fapi-v1-klines
      description: REST surface for fapi-v1-klines.
      operations:
      - method: GET
        name: getklines
        description: Kline/Candlestick data
        call: usds-margined-futures-market-data.getklines
        with:
          interval: rest.interval
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/openinterest
      name: fapi-v1-openinterest
      description: REST surface for fapi-v1-openInterest.
      operations:
      - method: GET
        name: getopeninterest
        description: Open interest
        call: usds-margined-futures-market-data.getopeninterest
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/ping
      name: fapi-v1-ping
      description: REST surface for fapi-v1-ping.
      operations:
      - method: GET
        name: testconnectivity
        description: Test connectivity
        call: usds-margined-futures-market-data.testconnectivity
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/premiumindex
      name: fapi-v1-premiumindex
      description: REST surface for fapi-v1-premiumIndex.
      operations:
      - method: GET
        name: getmarkprice
        description: Mark price
        call: usds-margined-futures-market-data.getmarkprice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/ticker/24hr
      name: fapi-v1-ticker-24hr
      description: REST surface for fapi-v1-ticker-24hr.
      operations:
      - method: GET
        name: get24hrticker
        description: 24hr ticker price change statistics
        call: usds-margined-futures-market-data.get24hrticker
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/ticker/price
      name: fapi-v1-ticker-price
      description: REST surface for fapi-v1-ticker-price.
      operations:
      - method: GET
        name: gettickerprice
        description: Symbol price ticker
        call: usds-margined-futures-market-data.gettickerprice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/time
      name: fapi-v1-time
      description: REST surface for fapi-v1-time.
      operations:
      - method: GET
        name: getservertime
        description: Check server time
        call: usds-margined-futures-market-data.getservertime
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fapi/v1/trades
      name: fapi-v1-trades
      description: REST surface for fapi-v1-trades.
      operations:
      - method: GET
        name: getrecenttrades
        description: Recent trades list
        call: usds-margined-futures-market-data.getrecenttrades
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usds-margined-futures-market-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance USD-S Margined Futures API — Market Data. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: order-book
      description: Order book
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getorderbook
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: exchange-information
      description: Exchange information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getexchangeinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: get-funding-rate-info
      description: Get funding rate info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getfundinginfo
      outputParameters:
      - type: object
        mapping: $.
    - name: get-funding-rate-history
      description: Get funding rate history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getfundingratehistory
      with:
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: kline-candlestick-data
      description: Kline/Candlestick data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getklines
      with:
        interval: tools.interval
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: open-interest
      description: Open interest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.getopeninterest
      outputParameters:
      - type: object
        mapping: $.
    - name: test-connectivity
      description: Test connectivity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usds-margined-futures-market-data.testconnectivity
