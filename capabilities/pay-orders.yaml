naftiko: 1.0.0-alpha2
info:
  label: Binance Pay API — Orders
  description: 'Binance Pay API — Orders. 3 operations. Lead operation: Close order. Self-contained Naftiko capability covering
    one Binance business surface.'
  tags:
  - Binance
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: pay-orders
    baseUri: https://bpay.binanceapi.com
    description: Binance Pay API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: binancepay-openapi-order-close
      path: /binancepay/openapi/order/close
      operations:
      - name: closeorder
        method: POST
        description: Close order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: binancepay-openapi-v2-order-query
      path: /binancepay/openapi/v2/order/query
      operations:
      - name: queryorder
        method: POST
        description: Query order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: binancepay-openapi-v3-order-create
      path: /binancepay/openapi/v3/order/create
      operations:
      - name: createorder
        method: POST
        description: Create order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: BinancePay-Certificate-SN
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pay-orders-rest
    port: 8080
    description: REST adapter for Binance Pay API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/binancepay/openapi/order/close
      name: binancepay-openapi-order-close
      description: REST surface for binancepay-openapi-order-close.
      operations:
      - method: POST
        name: closeorder
        description: Close order
        call: pay-orders.closeorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/binancepay/openapi/v2/order/query
      name: binancepay-openapi-v2-order-query
      description: REST surface for binancepay-openapi-v2-order-query.
      operations:
      - method: POST
        name: queryorder
        description: Query order
        call: pay-orders.queryorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/binancepay/openapi/v3/order/create
      name: binancepay-openapi-v3-order-create
      description: REST surface for binancepay-openapi-v3-order-create.
      operations:
      - method: POST
        name: createorder
        description: Create order
        call: pay-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pay-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Pay API — Orders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: close-order
      description: Close order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pay-orders.closeorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-order
      description: Query order
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pay-orders.queryorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-order
      description: Create order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pay-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
