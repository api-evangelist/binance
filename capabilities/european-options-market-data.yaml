naftiko: 1.0.0-alpha2
info:
  label: Binance European Options API — Market Data
  description: 'Binance European Options API — Market Data. 9 operations. Lead operation: Order book. Self-contained Naftiko
    capability covering one Binance business surface.'
  tags:
  - Binance
  - Market Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: european-options-market-data
    baseUri: https://eapi.binance.com
    description: Binance European Options API — Market Data business capability. Self-contained, no shared references.
    resources:
    - name: eapi-v1-depth
      path: /eapi/v1/depth
      operations:
      - name: getorderbook
        method: GET
        description: Order book
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
          description: Option symbol, e.g. BTC-250328-80000-C.
          required: true
        - name: limit
          in: query
          type: integer
          description: Number of levels. Default 100.
    - name: eapi-v1-exchangeInfo
      path: /eapi/v1/exchangeInfo
      operations:
      - name: getexchangeinfo
        method: GET
        description: Exchange information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eapi-v1-klines
      path: /eapi/v1/klines
      operations:
      - name: getklines
        method: GET
        description: Kline/Candlestick data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
          required: true
        - name: interval
          in: query
          type: string
          required: true
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: eapi-v1-mark
      path: /eapi/v1/mark
      operations:
      - name: getmarkprice
        method: GET
        description: Option mark price
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
          description: Option symbol. If not specified, returns all symbols.
    - name: eapi-v1-openInterest
      path: /eapi/v1/openInterest
      operations:
      - name: getopeninterest
        method: GET
        description: Open interest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: underlyingAsset
          in: query
          type: string
          description: Underlying asset, e.g. BTC.
          required: true
        - name: expiration
          in: query
          type: string
          description: Expiration date, e.g. 250328.
          required: true
    - name: eapi-v1-ping
      path: /eapi/v1/ping
      operations:
      - name: testconnectivity
        method: GET
        description: Test connectivity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eapi-v1-ticker
      path: /eapi/v1/ticker
      operations:
      - name: getticker
        method: GET
        description: 24hr ticker price change statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
          description: Option symbol.
    - name: eapi-v1-time
      path: /eapi/v1/time
      operations:
      - name: getservertime
        method: GET
        description: Check server time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eapi-v1-trades
      path: /eapi/v1/trades
      operations:
      - name: getrecenttrades
        method: GET
        description: Recent trades list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
          description: Option symbol.
          required: true
        - name: limit
          in: query
          type: integer
          description: Number of trades. Default 100, max 500.
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: european-options-market-data-rest
    port: 8080
    description: REST adapter for Binance European Options API — Market Data. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/eapi/v1/depth
      name: eapi-v1-depth
      description: REST surface for eapi-v1-depth.
      operations:
      - method: GET
        name: getorderbook
        description: Order book
        call: european-options-market-data.getorderbook
        with:
          symbol: rest.symbol
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/exchangeinfo
      name: eapi-v1-exchangeinfo
      description: REST surface for eapi-v1-exchangeInfo.
      operations:
      - method: GET
        name: getexchangeinfo
        description: Exchange information
        call: european-options-market-data.getexchangeinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/klines
      name: eapi-v1-klines
      description: REST surface for eapi-v1-klines.
      operations:
      - method: GET
        name: getklines
        description: Kline/Candlestick data
        call: european-options-market-data.getklines
        with:
          symbol: rest.symbol
          interval: rest.interval
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/mark
      name: eapi-v1-mark
      description: REST surface for eapi-v1-mark.
      operations:
      - method: GET
        name: getmarkprice
        description: Option mark price
        call: european-options-market-data.getmarkprice
        with:
          symbol: rest.symbol
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/openinterest
      name: eapi-v1-openinterest
      description: REST surface for eapi-v1-openInterest.
      operations:
      - method: GET
        name: getopeninterest
        description: Open interest
        call: european-options-market-data.getopeninterest
        with:
          underlyingAsset: rest.underlyingAsset
          expiration: rest.expiration
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/ping
      name: eapi-v1-ping
      description: REST surface for eapi-v1-ping.
      operations:
      - method: GET
        name: testconnectivity
        description: Test connectivity
        call: european-options-market-data.testconnectivity
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/ticker
      name: eapi-v1-ticker
      description: REST surface for eapi-v1-ticker.
      operations:
      - method: GET
        name: getticker
        description: 24hr ticker price change statistics
        call: european-options-market-data.getticker
        with:
          symbol: rest.symbol
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/time
      name: eapi-v1-time
      description: REST surface for eapi-v1-time.
      operations:
      - method: GET
        name: getservertime
        description: Check server time
        call: european-options-market-data.getservertime
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eapi/v1/trades
      name: eapi-v1-trades
      description: REST surface for eapi-v1-trades.
      operations:
      - method: GET
        name: getrecenttrades
        description: Recent trades list
        call: european-options-market-data.getrecenttrades
        with:
          symbol: rest.symbol
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: european-options-market-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance European Options API — Market Data. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: order-book
      description: Order book
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getorderbook
      with:
        symbol: tools.symbol
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: exchange-information
      description: Exchange information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getexchangeinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: kline-candlestick-data
      description: Kline/Candlestick data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getklines
      with:
        symbol: tools.symbol
        interval: tools.interval
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: option-mark-price
      description: Option mark price
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getmarkprice
      with:
        symbol: tools.symbol
      outputParameters:
      - type: object
        mapping: $.
    - name: open-interest
      description: Open interest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getopeninterest
      with:
        underlyingAsset: tools.underlyingAsset
        expiration: tools.expiration
      outputParameters:
      - type: object
        mapping: $.
    - name: test-connectivity
      description: Test connectivity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.testconnectivity
      outputParameters:
      - type: object
        mapping: $.
    - name: 24hr-ticker-price-change-statistics
      description: 24hr ticker price change statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getticker
      with:
        symbol: tools.symbol
      outputParameters:
      - type: object
        mapping: $.
    - name: check-server-time
      description: Check server time
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getservertime
      outputParameters:
      - type: object
        mapping: $.
    - name: recent-trades-list
      description: Recent trades list
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: european-options-market-data.getrecenttrades
      with:
        symbol: tools.symbol
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
