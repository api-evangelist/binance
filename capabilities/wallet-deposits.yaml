naftiko: 1.0.0-alpha2
info:
  label: Binance Wallet API — Deposits
  description: 'Binance Wallet API — Deposits. 2 operations. Lead operation: Deposit address. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  - Deposits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallet-deposits
    baseUri: https://api.binance.com
    description: Binance Wallet API — Deposits business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-capital-deposit-address
      path: /sapi/v1/capital/deposit/address
      operations:
      - name: getdepositaddress
        method: GET
        description: Deposit address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: coin
          in: query
          type: string
          required: true
        - name: network
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-capital-deposit-hisrec
      path: /sapi/v1/capital/deposit/hisrec
      operations:
      - name: getdeposithistory
        method: GET
        description: Deposit history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: coin
          in: query
          type: string
          description: Coin to query.
        - name: status
          in: query
          type: integer
          description: Deposit status. 0=pending, 6=credited, 1=success.
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
          description: Number of results. Default 1000, max 1000.
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
        - name: txId
          in: query
          type: string
          description: Transaction ID.
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallet-deposits-rest
    port: 8080
    description: REST adapter for Binance Wallet API — Deposits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sapi/v1/capital/deposit/address
      name: sapi-v1-capital-deposit-address
      description: REST surface for sapi-v1-capital-deposit-address.
      operations:
      - method: GET
        name: getdepositaddress
        description: Deposit address
        call: wallet-deposits.getdepositaddress
        with:
          coin: rest.coin
          network: rest.network
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/capital/deposit/hisrec
      name: sapi-v1-capital-deposit-hisrec
      description: REST surface for sapi-v1-capital-deposit-hisrec.
      operations:
      - method: GET
        name: getdeposithistory
        description: Deposit history
        call: wallet-deposits.getdeposithistory
        with:
          coin: rest.coin
          status: rest.status
          startTime: rest.startTime
          endTime: rest.endTime
          offset: rest.offset
          limit: rest.limit
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
          txId: rest.txId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallet-deposits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Wallet API — Deposits. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: deposit-address
      description: Deposit address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-deposits.getdepositaddress
      with:
        coin: tools.coin
        network: tools.network
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: deposit-history
      description: Deposit history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-deposits.getdeposithistory
      with:
        coin: tools.coin
        status: tools.status
        startTime: tools.startTime
        endTime: tools.endTime
        offset: tools.offset
        limit: tools.limit
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
        txId: tools.txId
      outputParameters:
      - type: object
        mapping: $.
