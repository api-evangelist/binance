naftiko: 1.0.0-alpha2
info:
  label: Binance COIN-M Futures API — Trading
  description: 'Binance COIN-M Futures API — Trading. 4 operations. Lead operation: Current all open orders. Self-contained
    Naftiko capability covering one Binance business surface.'
  tags:
  - Binance
  - Trading
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: coin-margined-futures-trading
    baseUri: https://dapi.binance.com
    description: Binance COIN-M Futures API — Trading business capability. Self-contained, no shared references.
    resources:
    - name: dapi-v1-openOrders
      path: /dapi/v1/openOrders
      operations:
      - name: getopenorders
        method: GET
        description: Current all open orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dapi-v1-order
      path: /dapi/v1/order
      operations:
      - name: createorder
        method: POST
        description: New order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: side
          in: query
          type: string
          required: true
        - name: positionSide
          in: query
          type: string
        - name: type
          in: query
          type: string
          required: true
        - name: timeInForce
          in: query
          type: string
        - name: quantity
          in: query
          type: string
        - name: reduceOnly
          in: query
          type: boolean
        - name: price
          in: query
          type: string
        - name: newClientOrderId
          in: query
          type: string
        - name: stopPrice
          in: query
          type: string
        - name: activationPrice
          in: query
          type: string
        - name: callbackRate
          in: query
          type: string
        - name: workingType
          in: query
          type: string
        - name: newOrderRespType
          in: query
          type: string
      - name: getorder
        method: GET
        description: Query order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: query
          type: integer
        - name: origClientOrderId
          in: query
          type: string
      - name: cancelorder
        method: DELETE
        description: Cancel order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: query
          type: integer
        - name: origClientOrderId
          in: query
          type: string
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: coin-margined-futures-trading-rest
    port: 8080
    description: REST adapter for Binance COIN-M Futures API — Trading. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/dapi/v1/openorders
      name: dapi-v1-openorders
      description: REST surface for dapi-v1-openOrders.
      operations:
      - method: GET
        name: getopenorders
        description: Current all open orders
        call: coin-margined-futures-trading.getopenorders
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dapi/v1/order
      name: dapi-v1-order
      description: REST surface for dapi-v1-order.
      operations:
      - method: POST
        name: createorder
        description: New order
        call: coin-margined-futures-trading.createorder
        with:
          side: rest.side
          positionSide: rest.positionSide
          type: rest.type
          timeInForce: rest.timeInForce
          quantity: rest.quantity
          reduceOnly: rest.reduceOnly
          price: rest.price
          newClientOrderId: rest.newClientOrderId
          stopPrice: rest.stopPrice
          activationPrice: rest.activationPrice
          callbackRate: rest.callbackRate
          workingType: rest.workingType
          newOrderRespType: rest.newOrderRespType
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getorder
        description: Query order
        call: coin-margined-futures-trading.getorder
        with:
          orderId: rest.orderId
          origClientOrderId: rest.origClientOrderId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelorder
        description: Cancel order
        call: coin-margined-futures-trading.cancelorder
        with:
          orderId: rest.orderId
          origClientOrderId: rest.origClientOrderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: coin-margined-futures-trading-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance COIN-M Futures API — Trading. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: current-all-open-orders
      description: Current all open orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coin-margined-futures-trading.getopenorders
      outputParameters:
      - type: object
        mapping: $.
    - name: new-order
      description: New order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: coin-margined-futures-trading.createorder
      with:
        side: tools.side
        positionSide: tools.positionSide
        type: tools.type
        timeInForce: tools.timeInForce
        quantity: tools.quantity
        reduceOnly: tools.reduceOnly
        price: tools.price
        newClientOrderId: tools.newClientOrderId
        stopPrice: tools.stopPrice
        activationPrice: tools.activationPrice
        callbackRate: tools.callbackRate
        workingType: tools.workingType
        newOrderRespType: tools.newOrderRespType
      outputParameters:
      - type: object
        mapping: $.
    - name: query-order
      description: Query order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coin-margined-futures-trading.getorder
      with:
        orderId: tools.orderId
        origClientOrderId: tools.origClientOrderId
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-order
      description: Cancel order
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: coin-margined-futures-trading.cancelorder
      with:
        orderId: tools.orderId
        origClientOrderId: tools.origClientOrderId
      outputParameters:
      - type: object
        mapping: $.
