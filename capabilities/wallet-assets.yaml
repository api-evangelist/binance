naftiko: 1.0.0-alpha2
info:
  label: Binance Wallet API — Assets
  description: 'Binance Wallet API — Assets. 5 operations. Lead operation: Asset dividend record. Self-contained Naftiko capability
    covering one Binance business surface.'
  tags:
  - Binance
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallet-assets
    baseUri: https://api.binance.com
    description: Binance Wallet API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v1-asset-assetDividend
      path: /sapi/v1/asset/assetDividend
      operations:
      - name: getassetdividend
        method: GET
        description: Asset dividend record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asset
          in: query
          type: string
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-asset-dust
      path: /sapi/v1/asset/dust
      operations:
      - name: dusttransfer
        method: POST
        description: Dust transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asset
          in: query
          type: string
          description: Assets to convert, separated by comma.
          required: true
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-asset-transfer
      path: /sapi/v1/asset/transfer
      operations:
      - name: useruniversaltransfer
        method: POST
        description: User universal transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Transfer type, e.g. MAIN_UMFUTURE, MAIN_CMFUTURE, MAIN_MARGIN, UMFUTURE_MAIN, etc.
          required: true
        - name: asset
          in: query
          type: string
          required: true
        - name: amount
          in: query
          type: string
          required: true
        - name: fromSymbol
          in: query
          type: string
        - name: toSymbol
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
      - name: getuseruniversaltransferhistory
        method: GET
        description: Query user universal transfer history
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          required: true
        - name: startTime
          in: query
          type: integer
        - name: endTime
          in: query
          type: integer
        - name: current
          in: query
          type: integer
        - name: size
          in: query
          type: integer
        - name: fromSymbol
          in: query
          type: string
        - name: toSymbol
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v1-capital-config-getall
      path: /sapi/v1/capital/config/getall
      operations:
      - name: getallcoinsinfo
        method: GET
        description: All coins information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallet-assets-rest
    port: 8080
    description: REST adapter for Binance Wallet API — Assets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sapi/v1/asset/assetdividend
      name: sapi-v1-asset-assetdividend
      description: REST surface for sapi-v1-asset-assetDividend.
      operations:
      - method: GET
        name: getassetdividend
        description: Asset dividend record
        call: wallet-assets.getassetdividend
        with:
          asset: rest.asset
          startTime: rest.startTime
          endTime: rest.endTime
          limit: rest.limit
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/asset/dust
      name: sapi-v1-asset-dust
      description: REST surface for sapi-v1-asset-dust.
      operations:
      - method: POST
        name: dusttransfer
        description: Dust transfer
        call: wallet-assets.dusttransfer
        with:
          asset: rest.asset
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/asset/transfer
      name: sapi-v1-asset-transfer
      description: REST surface for sapi-v1-asset-transfer.
      operations:
      - method: POST
        name: useruniversaltransfer
        description: User universal transfer
        call: wallet-assets.useruniversaltransfer
        with:
          type: rest.type
          asset: rest.asset
          amount: rest.amount
          fromSymbol: rest.fromSymbol
          toSymbol: rest.toSymbol
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getuseruniversaltransferhistory
        description: Query user universal transfer history
        call: wallet-assets.getuseruniversaltransferhistory
        with:
          type: rest.type
          startTime: rest.startTime
          endTime: rest.endTime
          current: rest.current
          size: rest.size
          fromSymbol: rest.fromSymbol
          toSymbol: rest.toSymbol
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v1/capital/config/getall
      name: sapi-v1-capital-config-getall
      description: REST surface for sapi-v1-capital-config-getall.
      operations:
      - method: GET
        name: getallcoinsinfo
        description: All coins information
        call: wallet-assets.getallcoinsinfo
        with:
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallet-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Binance Wallet API — Assets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: asset-dividend-record
      description: Asset dividend record
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-assets.getassetdividend
      with:
        asset: tools.asset
        startTime: tools.startTime
        endTime: tools.endTime
        limit: tools.limit
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: dust-transfer
      description: Dust transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wallet-assets.dusttransfer
      with:
        asset: tools.asset
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: user-universal-transfer
      description: User universal transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wallet-assets.useruniversaltransfer
      with:
        type: tools.type
        asset: tools.asset
        amount: tools.amount
        fromSymbol: tools.fromSymbol
        toSymbol: tools.toSymbol
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: query-user-universal-transfer-history
      description: Query user universal transfer history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-assets.getuseruniversaltransferhistory
      with:
        type: tools.type
        startTime: tools.startTime
        endTime: tools.endTime
        current: tools.current
        size: tools.size
        fromSymbol: tools.fromSymbol
        toSymbol: tools.toSymbol
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
    - name: all-coins-information
      description: All coins information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wallet-assets.getallcoinsinfo
      with:
        recvWindow: tools.recvWindow
        timestamp: tools.timestamp
        signature: tools.signature
      outputParameters:
      - type: object
        mapping: $.
