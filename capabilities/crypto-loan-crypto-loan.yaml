naftiko: 1.0.0-alpha2
info:
  label: Binance Crypto Loan API — Crypto Loan
  description: 'Binance Crypto Loan API — Crypto Loan. 6 operations. Lead operation: Flexible loan adjust LTV. Self-contained
    Naftiko capability covering one Binance business surface.'
  tags:
  - Binance
  - Crypto Loan
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BINANCE_API_KEY: BINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: crypto-loan-crypto-loan
    baseUri: https://api.binance.com
    description: Binance Crypto Loan API — Crypto Loan business capability. Self-contained, no shared references.
    resources:
    - name: sapi-v2-loan-flexible-adjust-ltv
      path: /sapi/v2/loan/flexible/adjust/ltv
      operations:
      - name: flexibleadjustltv
        method: POST
        description: Flexible loan adjust LTV
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loanCoin
          in: query
          type: string
          required: true
        - name: collateralCoin
          in: query
          type: string
          required: true
        - name: adjustmentAmount
          in: query
          type: string
          required: true
        - name: direction
          in: query
          type: string
          description: ADDITIONAL to add collateral, REDUCED to remove.
          required: true
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v2-loan-flexible-borrow
      path: /sapi/v2/loan/flexible/borrow
      operations:
      - name: flexibleborrow
        method: POST
        description: Flexible loan borrow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loanCoin
          in: query
          type: string
          required: true
        - name: loanAmount
          in: query
          type: string
        - name: collateralCoin
          in: query
          type: string
          required: true
        - name: collateralAmount
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v2-loan-flexible-collateral-data
      path: /sapi/v2/loan/flexible/collateral/data
      operations:
      - name: getcollateralassets
        method: GET
        description: Get flexible loan collateral assets data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: collateralCoin
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v2-loan-flexible-loanable-data
      path: /sapi/v2/loan/flexible/loanable/data
      operations:
      - name: getloanableassets
        method: GET
        description: Get flexible loan assets data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loanCoin
          in: query
          type: string
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v2-loan-flexible-ongoing-orders
      path: /sapi/v2/loan/flexible/ongoing/orders
      operations:
      - name: getflexibleloanorders
        method: GET
        description: Get flexible loan ongoing orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loanCoin
          in: query
          type: string
        - name: collateralCoin
          in: query
          type: string
        - name: current
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    - name: sapi-v2-loan-flexible-repay
      path: /sapi/v2/loan/flexible/repay
      operations:
      - name: flexiblerepay
        method: POST
        description: Flexible loan repay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: loanCoin
          in: query
          type: string
          required: true
        - name: collateralCoin
          in: query
          type: string
          required: true
        - name: repayAmount
          in: query
          type: string
          required: true
        - name: collateralReturn
          in: query
          type: boolean
        - name: fullRepayment
          in: query
          type: boolean
        - name: recvWindow
          in: query
          type: integer
        - name: timestamp
          in: query
          type: integer
          required: true
        - name: signature
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: X-MBX-APIKEY
      value: '{{env.BINANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: crypto-loan-crypto-loan-rest
    port: 8080
    description: REST adapter for Binance Crypto Loan API — Crypto Loan. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sapi/v2/loan/flexible/adjust/ltv
      name: sapi-v2-loan-flexible-adjust-ltv
      description: REST surface for sapi-v2-loan-flexible-adjust-ltv.
      operations:
      - method: POST
        name: flexibleadjustltv
        description: Flexible loan adjust LTV
        call: crypto-loan-crypto-loan.flexibleadjustltv
        with:
          loanCoin: rest.loanCoin
          collateralCoin: rest.collateralCoin
          adjustmentAmount: rest.adjustmentAmount
          direction: rest.direction
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v2/loan/flexible/borrow
      name: sapi-v2-loan-flexible-borrow
      description: REST surface for sapi-v2-loan-flexible-borrow.
      operations:
      - method: POST
        name: flexibleborrow
        description: Flexible loan borrow
        call: crypto-loan-crypto-loan.flexibleborrow
        with:
          loanCoin: rest.loanCoin
          loanAmount: rest.loanAmount
          collateralCoin: rest.collateralCoin
          collateralAmount: rest.collateralAmount
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v2/loan/flexible/collateral/data
      name: sapi-v2-loan-flexible-collateral-data
      description: REST surface for sapi-v2-loan-flexible-collateral-data.
      operations:
      - method: GET
        name: getcollateralassets
        description: Get flexible loan collateral assets data
        call: crypto-loan-crypto-loan.getcollateralassets
        with:
          collateralCoin: rest.collateralCoin
          recvWindow: rest.recvWindow
          timestamp: rest.timestamp
          signature: rest.signature
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sapi/v2/loan/flexible/loanable/data
