specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Binance
providerId: binance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cryptocurrency
  - Exchange
  - Trading
description: 'FOCUS-aligned FinOps for Binance: API connectivity is free; cost is incurred as
  per-transaction maker/taker take rates with VIP volume tiers and an optional BNB-paid fee discount.'
sources:
  - https://www.binance.com/en/fee/schedule
  - https://www.binance.com/en/binance-api
  - https://developers.binance.com/docs/binance-spot-api-docs/rest-api/limits
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Binance Holdings Ltd.
serviceCategory: Financial Services / Trading
billingModel:
  pricingCategory: Take Rate (Tiered) + Optional Token Discount
  billingFrequency: Continuous Settlement
  billingCurrency: USD (settlement varies, BNB available for fee payment)
  chargeCategories:
    - Usage
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Binance
  ServiceCategory: Financial Services
  ProviderName: Binance
  PublisherName: Binance Holdings Ltd.
  InvoiceIssuerName: Binance Holdings Ltd.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: spot_trades
    unit: transaction
    aggregation: sum
    dimensions:
      - symbol
      - side
      - maker_or_taker
      - vip_tier
  - name: spot_volume
    unit: USD
    aggregation: sum
    dimensions:
      - symbol
      - vip_tier
  - name: futures_trades
    unit: transaction
    aggregation: sum
    dimensions:
      - product
      - contract
      - maker_or_taker
      - vip_tier
  - name: futures_volume
    unit: USD
    aggregation: sum
    dimensions:
      - product
      - contract
  - name: bnb_fee_payments
    unit: BNB
    aggregation: sum
    dimensions:
      - product
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint_weight
      - vip_tier
principles:
  - name: Visibility
    description: Pull trade and fee detail via /api/v3/myTrades, /sapi/v1/asset/tradeFee, and the Tax
      Report API; reconcile against monthly account statements.
  - name: Allocation
    description: Use sub-accounts (Master / Sub-Account API) and Binance Link broker hierarchy to
      attribute trades and fees to teams, strategies, or end-clients.
  - name: Optimization
    description: Pursue VIP volume tier qualification for lower maker/taker fees, opt into the 25% BNB
      fee discount, prefer maker-side liquidity, and consolidate trading across the account family to
      lift 30-day volume into the next tier.
  - name: Accountability
    description: Assign desk-level owners for each sub-account, alert on per-tier fee thresholds and
      weight-ban events, and reconcile USD-denominated PnL against on-chain settlements.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
