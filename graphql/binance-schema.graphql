  isDefault: Boolean!
  depositEnable: Boolean!
  withdrawEnable: Boolean!
  depositDesc: String
  withdrawDesc: String
  specialTips: String
  specialWithdrawTips: String
  name: String!
  resetAddressStatus: Boolean!
  addressRegex: String!
  memoRegex: String!
  withdrawFee: String!
  withdrawMin: String!
  withdrawMax: String!
  minConfirm: Int!
  unLockConfirm: Int!
  sameAddress: Boolean!
  estimatedArrivalTime: Int!
  busy: Boolean!
  country: String
