}

"""Metadata about a cryptocurrency available on Binance."""
type CoinInfo {
  coin: String!
  depositAllEnable: Boolean!
  withdrawAllEnable: Boolean!
  name: String!
  free: String!
  locked: String!
  freeze: String!
  withdrawing: String!
  ipoing: String!
  ipoable: String!
  storage: String!
  isLegalMoney: Boolean!
  trading: Boolean!
