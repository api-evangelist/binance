  transferType: Int!
  confirmTimes: String!
  unlockConfirm: Int!
  walletType: Int!
}

# ---------------------------------------------------------------------------
# Account and Balance Types
# ---------------------------------------------------------------------------

"""Balance for a single asset in a spot wallet."""
type AssetBalance {
  asset: String!
  free: String!
  locked: String!
}

"""Balance for a single asset in a margin account."""
type MarginBalance {
  asset: String!
  borrowed: String!
  free: String!
  interest: String!
  locked: String!
  netAsset: String!
}

"""Balance for a single asset in a futures wallet."""
type FuturesBalance {
  accountAlias: String!
  asset: String!
  balance: String!
  crossWalletBalance: String!
  crossUnPnl: String!
  availableBalance: String!
  maxWithdrawAmount: String!
  marginAvailable: Boolean!
  updateTime: Float!
}

"""Top-level account object for a Binance user."""
type Account {
  makerCommission: Int!
  takerCommission: Int!
  buyerCommission: Int!
  sellerCommission: Int!
  commissionRates: CommissionRates!
  canTrade: Boolean!
  canWithdraw: Boolean!
  canDeposit: Boolean!
  brokered: Boolean!
  requireSelfTradePrevention: Boolean!
  preventSor: Boolean!
  updateTime: Float!
  accountType: String!
  balances: [AssetBalance!]!
  permissions: [Permission!]!
  uid: Float!
}

"""Commission rate configuration for an account."""
type CommissionRates {
  maker: String!
  taker: String!
  buyer: String!
  seller: String!
}

"""Account balance summary including all wallet types."""
type AccountBalance {
  totalAssetOfBtc: String!
  totalLiabilityOfBtc: String!
  totalNetAssetOfBtc: String!
  spotBalances: [AssetBalance!]!
  marginBalances: [MarginBalance!]!
  futuresBalances: [FuturesBalance!]!
}

# ---------------------------------------------------------------------------
# Order Types
# ---------------------------------------------------------------------------

"""A fill event for an individual order execution."""
type OrderFill {
  price: String!
  qty: String!
  commission: String!
  commissionAsset: String!
  tradeId: Int!
}

"""A spot market order."""
type SpotOrder {
  symbol: String!
  orderId: Int!
  orderListId: Int!
  clientOrderId: String!
  price: String!
  origQty: String!
  executedQty: String!
  cummulativeQuoteQty: String!
  status: OrderStatus!
  timeInForce: TimeInForce!
  type: OrderType!
  side: Side!
  stopPrice: String
  icebergQty: String
  time: Float!
  updateTime: Float!
  isWorking: Boolean!
  workingTime: Float!
  origQuoteOrderQty: String!
  fills: [OrderFill!]
  selfTradePreventionMode: String!
}

"""An order placed in the margin trading account."""
type MarginOrder {
  clientOrderId: String!
  cummulativeQuoteQty: String!
  executedQty: String!
  icebergQty: String
  isWorking: Boolean!
  orderId: Int!
  origQty: String!
  price: String!
  side: Side!
  status: OrderStatus!
  stopPrice: String
  symbol: String!
  isIsolated: Boolean!
  time: Float!
  timeInForce: TimeInForce!
  type: OrderType!
  updateTime: Float!
  selfTradePreventionMode: String!
}

"""An order placed on the futures exchange."""
type FuturesOrder {
  avgPrice: String!
  clientOrderId: String!
  cumQuote: String!
  executedQty: String!
  orderId: Int!
  origQty: String!
  origType: OrderType!
  price: String!
  reduceOnly: Boolean!
  side: Side!
  positionSide: PositionSide!
  status: OrderStatus!
  stopPrice: String
  closePosition: Boolean!
  symbol: String!
  time: Float!
  timeInForce: TimeInForce!
  type: OrderType!
  activatePrice: String
  priceRate: String
  updateTime: Float!
  workingType: String!
  priceProtect: Boolean!
  priceMatch: String
  selfTradePreventionMode: String!
  goodTillDate: Float
}

"""An OCO (One-Cancels-the-Other) order pair."""
type OCOOrder {
  orderListId: Int!
  contingencyType: String!
  listStatusType: String!
  listOrderStatus: String!
  listClientOrderId: String!
  transactionTime: Float!
  symbol: String!
  orders: [OCOOrderRef!]!
  orderReports: [SpotOrder!]!
}

"""A reference to one of the two orders within an OCO."""
type OCOOrderRef {
  symbol: String!
  orderId: Int!
  clientOrderId: String!
}

"""Acknowledgment returned when an order is cancelled."""
type CancelResponse {
  symbol: String!
  origClientOrderId: String!
  orderId: Int!
  orderListId: Int!
  clientOrderId: String!
  transactTime: Float!
  price: String!
  origQty: String!
  executedQty: String!
  cummulativeQuoteQty: String!
  status: OrderStatus!
  timeInForce: TimeInForce!
  type: OrderType!
  side: Side!
  selfTradePreventionMode: String!
}

# ---------------------------------------------------------------------------
# Margin-Specific Types
# ---------------------------------------------------------------------------

"""An order placed using cross-margin collateral."""
type CrossMarginOrder {
  clientOrderId: String!
  cummulativeQuoteQty: String!
  executedQty: String!
  orderId: Int!
  origQty: String!
  price: String!
  side: Side!
  status: OrderStatus!
  symbol: String!
  isIsolated: Boolean!
  timeInForce: TimeInForce!
  type: OrderType!
  updateTime: Float!
  marginBuyBorrowAmount: String
  marginBuyBorrowAsset: String
}

"""An order placed against an isolated margin pool for a specific symbol."""
type IsolatedMarginOrder {
  clientOrderId: String!
  executedQty: String!
  orderId: Int!
  origQty: String!
  price: String!
  side: Side!
  status: OrderStatus!
  symbol: String!
  timeInForce: TimeInForce!
  type: OrderType!
  updateTime: Float!
  baseAsset: String!
  quoteAsset: String!
}

"""A margin borrow event."""
type MarginLoan {
  isolatedSymbol: String
  txId: Float!
  asset: String!
  principal: String!
  timestamp: Float!
  status: LoanStatus!
}

"""A margin loan repayment event."""
type MarginRepay {
  isolatedSymbol: String
  amount: String!
  asset: String!
  interest: String!
  principal: String!
  status: LoanStatus!
  timestamp: Float!
  txId: Float!
}

# ---------------------------------------------------------------------------
