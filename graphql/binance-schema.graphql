# ---------------------------------------------------------------------------
# Earn and Staking Types
# ---------------------------------------------------------------------------

"""A simple earn flexible savings product."""
type FlexibleProduct {
  asset: String!
  latestAnnualPercentageRate: String!
  tierAnnualPercentageRate: String
  airDropPercentageRate: String
  canPurchase: Boolean!
  canRedeem: Boolean!
  isSoldOut: Boolean!
  hot: Boolean!
  minPurchaseAmount: String!
  productId: String!
  subscriptionStartTime: Float
  status: EarnProductStatus!
}

"""A locked staking product with a fixed term."""
type StakingProduct {
  projectId: String!
  detail: StakingProductDetail!
  quota: StakingQuota!
}

"""Detail fields for a staking product."""
type StakingProductDetail {
  asset: String!
  rewardAsset: String!
  duration: Int!
  renewable: Boolean!
  apy: String!
}

"""Quota and subscription limit information for a staking product."""
type StakingQuota {
  totalPersonalQuota: String!
  minimum: String!
}

# ---------------------------------------------------------------------------
# Root Types
# ---------------------------------------------------------------------------

type Query {
  """Authenticated account information including balances and permissions."""
  account: Account

  """Aggregated balance view across spot, margin, and futures wallets."""
  accountBalance: AccountBalance

  """Retrieve a single spot order by symbol and order ID."""
  spotOrder(symbol: String!, orderId: Int!): SpotOrder

  """List all orders for a symbol, optionally filtered by status."""
  spotOrders(symbol: String!, startTime: Float, endTime: Float, limit: Int): [SpotOrder!]

  """All currently open spot orders, optionally filtered by symbol."""
  openOrders(symbol: String): [SpotOrder!]

  """OCO order details by order list ID."""
  ocoOrder(orderListId: Int!): OCOOrder

  """Current order book for a symbol."""
  orderBook(symbol: String!, limit: Int): OrderBook

  """24-hour rolling price change statistics for a symbol."""
  ticker(symbol: String!): Ticker

  """24-hour rolling statistics for all symbols."""
  tickers: [Ticker!]

  """Compact ticker statistics for a symbol."""
  miniTicker(symbol: String!): MiniTicker

  """Best bid and ask for a symbol."""
  bookTicker(symbol: String!): BookTicker

  """Candlestick data for a symbol and interval."""
  klines(symbol: String!, interval: KlineInterval!, startTime: Float, endTime: Float, limit: Int): [KlineData!]

  """Recent trades for a symbol."""
  recentTrades(symbol: String!, limit: Int): [Trade!]

  """Aggregated trade history for a symbol."""
  aggTrades(symbol: String!, fromId: Int, startTime: Float, endTime: Float, limit: Int): [AggTrade!]

  """Full exchange configuration including symbols and rate limits."""
  exchangeInfo(symbol: String): ExchangeInfo

  """Current system operational status."""
  systemStatus: SystemStatus

  """Current exchange server time."""
  serverTime: ServerTime

  """Market trend summary for a symbol."""
  marketTrend(symbol: String!, period: String!): MarketTrend

  """Aggregate market summary statistics."""
  marketSummary: MarketSummary

  """Metadata for a specific coin."""
  coinInfo(coin: String!): CoinInfo

  """All coins available on the platform."""
  allCoins: [CoinInfo!]

  """Generated deposit address for a coin on a network."""
  depositAddress(coin: String!, network: String): DepositAddress

  """Deposit history for the authenticated account."""
  depositHistory(coin: String, status: DepositStatus, startTime: Float, endTime: Float, limit: Int): [DepositRecord!]

  """Withdrawal history for the authenticated account."""
  withdrawalHistory(coin: String, status: WithdrawalStatus, startTime: Float, endTime: Float, limit: Int): [WithdrawalRecord!]

  """Open futures positions for the authenticated account."""
  positions(symbol: String): [Position!]

  """Risk metrics for open futures positions."""
  positionRisk(symbol: String): [PositionRisk!]

  """Current mark price for a futures symbol."""
  markPrice(symbol: String!): MarkPrice

  """Current index price for a futures symbol."""
  indexPrice(symbol: String!): IndexPrice

  """Funding rate history for a futures symbol."""
  fundingRates(symbol: String!, startTime: Float, endTime: Float, limit: Int): [FundingFee!]

  """Funding payment income history."""
  fundingHistory(symbol: String, startTime: Float, endTime: Float, limit: Int): [Funding!]

  """Futures order details."""
  futuresOrder(symbol: String!, orderId: Int!): FuturesOrder

  """All open futures orders."""
  openFuturesOrders(symbol: String): [FuturesOrder!]

  """Cross-margin account details."""
  crossMarginAccount: CrossMarginAccount

  """Isolated margin account details for all symbols."""
  isolatedMarginAccount: IsolatedMarginAccount

  """Margin loan history."""
  marginLoans(asset: String!, startTime: Float, endTime: Float, limit: Int): [MarginLoan!]

  """Margin repayment history."""
  marginRepayments(asset: String!, startTime: Float, endTime: Float, limit: Int): [MarginRepay!]

  """Portfolio margin account state."""
  portfolioMargin: PortfolioMargin

  """Available flexible earn products."""
  flexibleProducts(asset: String, status: EarnProductStatus): [FlexibleProduct!]

  """Available staking products."""
  stakingProducts(asset: String): [StakingProduct!]

  """Liquidation history for futures positions."""
  liquidationHistory(symbol: String, startTime: Float, endTime: Float, limit: Int): [Liquidation!]
}

type Mutation {
  """Place a new spot order."""
  placeSpotOrder(
    symbol: String!
    side: Side!
    type: OrderType!
    timeInForce: TimeInForce
    quantity: String
    quoteOrderQty: String
    price: String
    newClientOrderId: String
    stopPrice: String
    icebergQty: String
    newOrderRespType: String
  ): SpotOrder

  """Cancel an existing spot order."""
  cancelSpotOrder(symbol: String!, orderId: Int, origClientOrderId: String): CancelResponse

  """Place an OCO order pair."""
  placeOCOOrder(
    symbol: String!
    side: Side!
    quantity: String!
    price: String!
    stopPrice: String!
    stopLimitPrice: String
    stopLimitTimeInForce: TimeInForce
  ): OCOOrder

  """Cancel an OCO order."""
  cancelOCOOrder(symbol: String!, orderListId: Int, listClientOrderId: String): OCOOrder

  """Place a new futures order."""
  placeFuturesOrder(
    symbol: String!
    side: Side!
    positionSide: PositionSide
    type: OrderType!
    timeInForce: TimeInForce
    quantity: String
    reduceOnly: Boolean
    price: String
    newClientOrderId: String
    stopPrice: String
    closePosition: Boolean
    activationPrice: String
    callbackRate: String
    workingType: String
    priceProtect: Boolean
  ): FuturesOrder

  """Cancel an existing futures order."""
  cancelFuturesOrder(symbol: String!, orderId: Int, origClientOrderId: String): FuturesOrder

  """Create a new user data stream listen key."""
  createListenKey: ListenKey

  """Renew a user data stream listen key to prevent expiry."""
  keepAliveListenKey(listenKey: String!): Boolean

  """Close a user data stream."""
  closeListenKey(listenKey: String!): Boolean

  """Initiate a cryptocurrency withdrawal."""
  withdraw(
    coin: String!
    withdrawOrderId: String
    network: String
    address: String!
    addressTag: String
    amount: String!
    transactionFeeFlag: Boolean
    name: String
    walletType: Int
  ): WithdrawalRecord

  """Borrow assets for margin trading."""
  borrowMargin(
    asset: String!
    amount: String!
    isIsolated: Boolean
    symbol: String
  ): MarginLoan

  """Repay borrowed margin assets."""
  repayMargin(
    asset: String!
    amount: String!
    isIsolated: Boolean
    symbol: String
  ): MarginRepay

  """Transfer assets between spot, margin, and futures wallets."""
  transferAsset(
    asset: String!
    amount: String!
    type: String!
  ): AssetTransferResult

  """Subscribe to a flexible earn product."""
  subscribeFlexibleProduct(productId: String!, amount: String!): Boolean

  """Redeem a flexible earn product."""
  redeemFlexibleProduct(productId: String!, amount: String!): Boolean
}

type Subscription {
  """Real-time incremental order book depth updates for a symbol."""
  orderBookUpdate(symbol: String!, levels: Int): Depth

  """Real-time 24-hour ticker statistics for a symbol."""
  tickerUpdate(symbol: String!): Ticker

  """Real-time ticker updates for all symbols."""
  allTickersUpdate: [MiniTicker!]

  """Live individual trade events for a symbol."""
  tradeStream(symbol: String!): Trade

  """Live aggregated trade events for a symbol."""
  aggTradeStream(symbol: String!): AggTrade

  """Real-time candlestick updates for a symbol and interval."""
  klineStream(symbol: String!, interval: KlineInterval!): KlineData

  """Real-time best bid and ask updates for a symbol."""
  bookTickerStream(symbol: String!): BookTicker

  """Private account events including order updates and balance changes."""
  userDataStream(listenKey: String!): UserDataEvent

  """Real-time mark price updates for a futures symbol."""
  markPriceStream(symbol: String!): MarkPrice

  """Real-time liquidation events across the exchange."""
  liquidationStream(symbol: String): Liquidation
}

# ---------------------------------------------------------------------------
# Supporting Types (referenced in Query/Mutation/Subscription)
# ---------------------------------------------------------------------------

"""A cross-margin account with aggregate balance and open positions."""
type CrossMarginAccount {
  borrowEnabled: Boolean!
  marginLevel: String!
  totalAssetOfBtc: String!
  totalLiabilityOfBtc: String!
  totalNetAssetOfBtc: String!
  tradeEnabled: Boolean!
  transferEnabled: Boolean!
  userAssets: [MarginBalance!]!
}

"""Isolated margin account summary across all active symbols."""
type IsolatedMarginAccount {
  assets: [IsolatedMarginAsset!]!
  totalAssetOfBtc: String
  totalLiabilityOfBtc: String
  totalNetAssetOfBtc: String
}

"""Isolated margin position for a single symbol."""
type IsolatedMarginAsset {
  symbol: String!
  isolatedCreated: Boolean!
  enabled: Boolean!
  marginLevel: String!
  marginLevelStatus: String!
  marginRatio: String!
  indexPrice: String!
  liquidatePrice: String!
  liquidateRate: String!
  tradeEnabled: Boolean!
  baseAsset: IsolatedMarginBalance!
  quoteAsset: IsolatedMarginBalance!
}

"""Balance details for one side of an isolated margin position."""
type IsolatedMarginBalance {
  asset: String!
  borrowEnabled: Boolean!
  borrowed: String!
  free: String!
  interest: String!
  locked: String!
  netAsset: String!
  netAssetOfBtc: String!
  repayEnabled: Boolean!
  totalAsset: String!
}

"""Result of an inter-wallet asset transfer."""
type AssetTransferResult {
  tranId: Float!
}

"""A real-time user data event from the private WebSocket stream."""
type UserDataEvent {
  eventType: String!
  eventTime: Float!
  order: SpotOrder
  balance: AssetBalance
  outboundAccountPosition: [AssetBalance!]
}
