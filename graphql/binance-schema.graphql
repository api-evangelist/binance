  positionAmt: String!
  entryPrice: String!
  breakEvenPrice: String!
  markPrice: String!
  unRealizedProfit: String!
  liquidationPrice: String!
  leverage: String!
  maxNotionalValue: String!
  marginType: MarginType!
  isolatedMargin: String!
  isAutoAddMargin: Boolean!
  positionSide: PositionSide!
  notional: String!
  isolatedWallet: String!
  updateTime: Float!
}

"""Risk metrics for an open futures position."""
type PositionRisk {
  entryPrice: String!
  breakEvenPrice: String!
  marginType: MarginType!
  isAutoAddMargin: Boolean!
  isolatedMargin: String!
  leverage: String!
  liquidationPrice: String!
  markPrice: String!
  maxNotionalValue: String!
  positionAmt: String!
  notional: String!
  isolatedWallet: String!
  symbol: String!
  unrealizedProfit: String!
  positionSide: PositionSide!
  updateTime: Float!
}

"""Current mark price for a futures symbol."""
type MarkPrice {
  symbol: String!
  markPrice: String!
  indexPrice: String!
  estimatedSettlePrice: String!
  lastFundingRate: String!
  nextFundingTime: Float!
  interestRate: String!
