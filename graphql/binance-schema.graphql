"""
Binance GraphQL Schema
Conceptual schema modeling the Binance REST and WebSocket API surface.
Covers spot trading, margin, futures, wallet, market data, and account operations.
Source APIs: https://developers.binance.com/docs/binance-spot-api-docs/rest-api
"""

# ---------------------------------------------------------------------------
# Enumerations
# ---------------------------------------------------------------------------

enum OrderType {
  LIMIT
  MARKET
  STOP_LOSS
  STOP_LOSS_LIMIT
  TAKE_PROFIT
  TAKE_PROFIT_LIMIT
  LIMIT_MAKER
  TRAILING_STOP_MARKET
}

enum TimeInForce {
  GTC
  IOC
  FOK
  GTX
  GTD
}

enum Side {
  BUY
  SELL
}

enum OrderStatus {
  NEW
  PARTIALLY_FILLED
  FILLED
  CANCELED
  PENDING_CANCEL
  REJECTED
  EXPIRED
  EXPIRED_IN_MATCH
}

enum ExecutionType {
  NEW
  CANCELED
  REPLACED
  REJECTED
  TRADE
  EXPIRED
}

enum Permission {
  SPOT
  MARGIN
  LEVERAGED
  TRD_GRP_002
  TRD_GRP_003
  TRD_GRP_004
  TRD_GRP_005
}

enum PositionSide {
  BOTH
  LONG
  SHORT
}

enum MarginType {
  ISOLATED
  CROSSED
}

enum ContractType {
  PERPETUAL
  CURRENT_MONTH
  NEXT_MONTH
  CURRENT_QUARTER
  NEXT_QUARTER
}

enum SymbolStatus {
  PRE_TRADING
  TRADING
  POST_TRADING
  END_OF_DAY
  HALT
  AUCTION_MATCH
  BREAK
}

enum RateLimitType {
  REQUEST_WEIGHT
  ORDERS
  RAW_REQUESTS
}

enum RateLimitInterval {
  SECOND
  MINUTE
  DAY
}

enum KlineInterval {
  ONE_SECOND
  ONE_MINUTE
  THREE_MINUTES
  FIVE_MINUTES
  FIFTEEN_MINUTES
  THIRTY_MINUTES
  ONE_HOUR
  TWO_HOURS
  FOUR_HOURS
  SIX_HOURS
  EIGHT_HOURS
  TWELVE_HOURS
  ONE_DAY
  THREE_DAYS
  ONE_WEEK
  ONE_MONTH
}

enum NetworkStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
}

enum WithdrawalStatus {
  EMAIL_SENT
  CANCELLED
  AWAITING_APPROVAL
  REJECTED
  PROCESSING
  FAILURE
  COMPLETED
}

enum DepositStatus {
  PENDING
  WAITING_CONFIRMATION
  SUCCESS
  CREDITED
  WRONG_DEPOSIT
  WAITING_USER_CONFIRM
}

enum LoanStatus {
  PENDING
  CONFIRMED
  FAILED
}

enum EarnProductStatus {
  SUBSCRIBABLE
  UNSUBSCRIBABLE
}

# ---------------------------------------------------------------------------
# Market Data Types
# ---------------------------------------------------------------------------

"""A single entry in an order book at a specific price level."""
type OrderBookEntry {
  price: String!
  quantity: String!
}

"""Current order book depth for a symbol."""
type OrderBook {
  symbol: String!
  lastUpdateId: Int!
  bids: [OrderBookEntry!]!
  asks: [OrderBookEntry!]!
}

"""An incremental order book depth update."""
type Depth {
  symbol: String!
  firstUpdateId: Int!
  finalUpdateId: Int!
  bids: [OrderBookEntry!]!
  asks: [OrderBookEntry!]!
}

"""24-hour rolling window price change statistics for a symbol."""
type Ticker {
  symbol: String!
  priceChange: String!
  priceChangePercent: String!
  weightedAvgPrice: String!
  prevClosePrice: String!
  lastPrice: String!
  lastQty: String!
  bidPrice: String!
  bidQty: String!
  askPrice: String!
  askQty: String!
  openPrice: String!
  highPrice: String!
  lowPrice: String!
  volume: String!
  quoteVolume: String!
  openTime: Float!
  closeTime: Float!
  firstId: Int!
  lastId: Int!
  count: Int!
}

"""Compact 24-hour statistics with reduced fields."""
type MiniTicker {
  symbol: String!
  closePrice: String!
  openPrice: String!
  highPrice: String!
  lowPrice: String!
  baseVolume: String!
  quoteVolume: String!
  eventTime: Float!
}

"""Best bid and ask price and quantity for a symbol."""
type BookTicker {
  symbol: String!
  bidPrice: String!
  bidQty: String!
  askPrice: String!
  askQty: String!
}

"""A single aggregated trade record compressing multiple same-price fills."""
type AggTrade {
  aggregateTradeId: Int!
  symbol: String!
  price: String!
  quantity: String!
  firstTradeId: Int!
  lastTradeId: Int!
  timestamp: Float!
  isBuyerMaker: Boolean!
  isBestMatch: Boolean!
}

"""A raw individual trade on the exchange."""
type Trade {
  id: Int!
  symbol: String!
  price: String!
  qty: String!
  quoteQty: String!
  time: Float!
  isBuyerMaker: Boolean!
  isBestMatch: Boolean!
}

"""OHLCV data for a time period."""
type OHLCV {
  open: String!
  high: String!
  low: String!
  close: String!
  volume: String!
  quoteAssetVolume: String!
  numberOfTrades: Int!
}

"""A candlestick data record for a symbol and interval."""
type KlineData {
  symbol: String!
  interval: KlineInterval!
  openTime: Float!
  closeTime: Float!
  ohlcv: OHLCV!
  takerBuyBaseAssetVolume: String!
  takerBuyQuoteAssetVolume: String!
}

"""Directional market movement and momentum summary."""
type MarketTrend {
  symbol: String!
  direction: String!
  changePercent: Float!
  momentum: Float!
  period: String!
}

"""Exchange-wide aggregate market statistics."""
type MarketSummary {
  totalSymbols: Int!
  activeSymbols: Int!
  totalVolume24h: String!
  totalQuoteVolume24h: String!
  advancers: Int!
  decliners: Int!
  unchanged: Int!
  timestamp: Float!
}

# ---------------------------------------------------------------------------
# Symbol and Exchange Info Types
# ---------------------------------------------------------------------------

"""Filter constraining trading for a symbol."""
type SymbolFilter {
  filterType: String!
  minPrice: String
  maxPrice: String
  tickSize: String
  minQty: String
  maxQty: String
  stepSize: String
  minNotional: String
  applyToMarket: Boolean
  avgPriceMins: Int
  limit: Int
  maxNumOrders: Int
  maxNumAlgoOrders: Int
  maxNumIcebergOrders: Int
  maxPosition: String
  bidMultiplierUp: String
  bidMultiplierDown: String
  askMultiplierUp: String
  askMultiplierDown: String
  multiplierDecimal: String
}

"""Full metadata and trading rules for a trading pair."""
type SymbolInfo {
  symbol: String!
  status: SymbolStatus!
  baseAsset: String!
  baseAssetPrecision: Int!
  quoteAsset: String!
  quotePrecision: Int!
  quoteAssetPrecision: Int!
  baseCommissionPrecision: Int!
  quoteCommissionPrecision: Int!
  orderTypes: [OrderType!]!
  icebergAllowed: Boolean!
  ocoAllowed: Boolean!
  quoteOrderQtyMarketAllowed: Boolean!
  allowTrailingStop: Boolean!
  cancelReplaceAllowed: Boolean!
  isSpotTradingAllowed: Boolean!
  isMarginTradingAllowed: Boolean!
  filters: [SymbolFilter!]!
  permissions: [Permission!]!
}

"""Lightweight reference to a trading pair."""
type Symbol {
  symbol: String!
  baseAsset: String!
  quoteAsset: String!
  status: SymbolStatus!
}

"""Rate limiting rule from the exchange."""
type RateLimits {
  rateLimitType: RateLimitType!
  interval: RateLimitInterval!
  intervalNum: Int!
  limit: Int!
}

"""Full exchange configuration including all symbols and rate limits."""
type ExchangeInfo {
  timezone: String!
  serverTime: Float!
  rateLimits: [RateLimits!]!
  exchangeFilters: [SymbolFilter!]!
  symbols: [SymbolInfo!]!
}

"""Current operational status of the Binance exchange."""
type SystemStatus {
  status: Int!
  msg: String!
}

"""Exchange server timestamp."""
type ServerTime {
  serverTime: Float!
}

# ---------------------------------------------------------------------------
# Coin and Network Types
# ---------------------------------------------------------------------------

"""A blockchain network available for a coin."""
type NetworkInfo {
  network: String!
  coin: String!
