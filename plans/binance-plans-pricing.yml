specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Binance
providerId: binance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cryptocurrency
  - Exchange
  - Trading
  - Blockchain
  - Finance
  - DeFi
  - Market Data
description: Binance does not charge for API access itself; commercial pricing is expressed as
  spot/futures trading commissions and a tiered VIP fee schedule based on 30-day trading volume and BNB
  holdings. API connectivity, market data, and WebSocket streams are provided at no cost to authenticated
  users; revenue is captured per-trade. Higher VIP tiers also confer raised request weight ceilings.
sources:
  - https://www.binance.com/en/fee/schedule
  - https://www.binance.com/en/binance-api
  - https://developers.binance.com/docs/binance-spot-api-docs/rest-api/limits
plans:
  - id: binance-api-access
    name: API Access (No Fee)
    type: freemium
    description: Free programmatic access to Binance's REST and WebSocket APIs for any authenticated
      account. Trading is what is billed, not connectivity.
    entries:
      - label: API connectivity
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Market data (REST + WebSocket)
        name: market_data
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Spot Trading API
      - name: USD-S Margined Futures API
      - name: COIN-M Futures API
      - name: European Options API
      - name: Margin Trading API
      - name: Wallet API
      - name: WebSocket Streams
      - name: Sandbox / Spot Testnet
  - id: binance-spot-regular
    name: Spot Trading - Regular User
    type: usage-based
    description: Default maker/taker commission for accounts under VIP 1 thresholds (less than $1M
      30-day spot volume). BNB holders receive a 25% discount when paying fees in BNB.
    entries:
      - label: Maker fee
        name: spot_maker_regular
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.1000%'
        userMultiplied: false
      - label: Taker fee
        name: spot_taker_regular
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.1000%'
        userMultiplied: false
      - label: BNB fee discount
        name: bnb_discount
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '-25% when paid in BNB'
        userMultiplied: false
    elements:
      - name: Spot Trading
      - name: Margin Trading
      - name: Convert
      - name: Copy Trading
      - name: Trading Bots
  - id: binance-spot-vip
    name: Spot Trading - VIP Tiers
    type: tiered
    description: Volume-discounted maker/taker fees for accounts that meet 30-day trading volume and BNB
      balance thresholds. VIP status applies universally across Binance products.
    entries:
      - label: VIP 1 maker / taker (>= $1M volume, >= 5 BNB)
        name: spot_vip1
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0900% / 0.1000%'
        userMultiplied: false
      - label: VIP 3 maker / taker (>= $20M volume, >= 100 BNB)
        name: spot_vip3
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0400% / 0.0600%'
        userMultiplied: false
      - label: VIP 5 maker / taker (>= $150M volume, >= 1000 BNB)
        name: spot_vip5
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0250% / 0.0310%'
        userMultiplied: false
      - label: VIP 9 maker / taker (>= $4B volume, >= 5500 BNB)
        name: spot_vip9
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0110% / 0.0230%'
        userMultiplied: false
    elements:
      - name: Reduced Spot/Margin/Convert/Copy/Bot fees
      - name: Higher API request weight ceilings at higher VIP tiers
      - name: Priority customer support at upper tiers
  - id: binance-institutional
    name: Institutional / Broker
    type: enterprise
    description: Negotiated fee schedules for institutional, market maker, broker, and Binance Link
      partners. Pricing and rebates negotiated per relationship.
    entries:
      - label: Institutional fees
        name: institutional_fees
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Binance Link / Broker Program
      - name: Market Maker Program
      - name: Liquidity Provider rebates
      - name: Sub-account hierarchy
      - name: Dedicated relationship management
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
